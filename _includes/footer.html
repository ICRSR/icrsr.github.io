<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <h2 class="footer-heading">{{ site.title | escape }}</h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <!-- <li class="p-name">
              {%- if site.author -%}
                {{ site.author | escape }}
              {%- else -%}
                {{ site.title | escape }}
              {%- endif -%}
              </li> -->
          {%- if site.email -%}
          <li>
            <a class="u-email" href="mailto:{{ site.email }}">
              <i class="fa-solid fa-envelope"></i> {{ site.email }}
            </a>
          </li>
          {%- endif -%}
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{- site.description | escape -}}</p>
      </div>
    </div>


    <div class="footer-logos">
      <div class="organization-text">Organized by:</div>
      <div class="organization-logo-container">
        <a href="https://www.ips.pt/">
          <img class="organization-logo" src="{{ "/assets/images/ips-logo-new-english.png" | relative_url }}"
            alt="IPS Logo">
        </a>
      </div>

      <div class="partners">
        <div class="partners-text">Partners:</div>
        <div class="partners-logos">
          <div class="partner-logo-container">
            <a href="https://www.businet.org.uk/">
              <img class="partner-logo" src="{{ "/assets/images/businet-logo.png" | relative_url }}"
                alt="Businet Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="https://www.cieqv.pt/">
              <img class="partner-logo" src="{{ "/assets/images/cieqv-logo.svg" | relative_url }}" alt="CIEQV Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="http://citur-tourismresearch.com/">
              <img class="partner-logo" src="{{ "/assets/images/citur-logo.webp" | relative_url }}" alt="CITUR Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="https://eudres.eu/">
              <img class="partner-logo" src="{{ "/assets/images/eudres-logo.png" | relative_url }}" alt="EUDRES Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="https://aforges.org/">
              <img class="partner-logo" src="{{ "/assets/images/forges-logo.png" | relative_url }}" alt="FORGES Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="https://www.internationalbusinessweek.com/">
              <img class="partner-logo" src="{{ "/assets/images/ibw-logo.png" | relative_url }}" alt="IBW Logo">
            </a>
          </div>
          <div class="partner-logo-container">
            <a href="https://www.mare-centre.pt/"">
                <img class=" partner-logo" src="{{ "/assets/images/mare-logo.png" | relative_url }}"
              alt="MARE Logo">
            </a>
          </div>
        </div>
      </div>

    </div>

  </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
